function applyFocus(exercises,focus){
  let f=exercises;
  if(focus.advancedMode&&focus.targetMuscles?.length){
    const targets=focus.targetMuscles.map(t=>t.toLowerCase());
    const filtered=f.filter(e=>{const mg=(e.muscleGroup||"").toLowerCase();const tags=e.tags||[];return targets.some(t=>mg.includes(t)||tags.some(tag=>t.includes(tag)||tag.includes(t)));});
    if(filtered.length>=2)f=filtered;
  }else if(focus.trainingFocus==="upper")f=f.filter(e=>e.tags?.includes("upper")||e.tags?.includes("core"));
  else if(focus.trainingFocus==="lower")f=f.filter(e=>e.tags?.includes("lower")||e.tags?.includes("core"));
  else if(focus.trainingFocus==="core")f=f.filter(e=>e.tags?.includes("core")||e.tags?.includes("upper"));
  if(focus.skipKnees)f=f.filter(e=>!e.tags?.includes("knee"));
  if(focus.skipAnkle)f=f.filter(e=>!e.tags?.includes("ankle"));
  if(focus.skipShoulders)f=f.filter(e=>!e.tags?.includes("shoulder"));
  if(focus.skipBack)f=f.filter(e=>!e.tags?.includes("back"));
  if(focus.skipChest)f=f.filter(e=>!e.tags?.includes("chest"));
  if(f.length<3)f=exercises.filter(e=>{if(focus.skipKnees&&e.tags?.includes("knee"))return false;if(focus.skipAnkle&&e.tags?.includes("ankle"))return false;if(focus.skipShoulders&&e.tags?.includes("shoulder"))return false;if(focus.skipBack&&e.tags?.includes("back"))return false;if(focus.skipChest&&e.tags?.includes("chest"))return false;return true;});
  if(focus.deload)f=f.map(e=>({...e,reps:Math.round(e.reps*1.25),sets:Math.max(2,e.sets-1),startWeight:Math.round(e.startWeight*0.8*2)/2}));
  return f.slice(0,6);
}
function getFallback(dayId,sessionNum,recentIds,focus){
  // Pick pool with least overlap with recent exercises
  const pools=EXERCISE_LIBRARY[dayId];
  const overlap=i=>pools[i].filter(e=>recentIds.includes(e.id)).length;
  const poolIdx=[0,1,2].sort((a,b)=>overlap(a)-overlap(b))[0]??sessionNum%3;
  const pool=pools[poolIdx];
  const focused=applyFocus(pool,focus);
  const dur=getDurationConfig(focus.workoutDuration||45);
  let exs=focused.filter(e=>!recentIds.slice(0,10).includes(e.id)).length>=3?focused.filter(e=>!recentIds.slice(0,10).includes(e.id)):focused;
  // Cap count and sets to match duration
  exs=exs.slice(0,dur.maxEx).map((e,i)=>{
    const sets=dur.setsHint<=2?Math.min(e.sets,2):dur.setsHint<=3?Math.min(e.sets,3):e.sets;
    // Assign variation to 1-2 exercises per session (skip index 0 and compound lifts)
    const isIsolation=!["Quads","Hamstrings","Back","Lats","Chest","Upper Chest"].includes(e.muscleGroup);
    const varIdx=(sessionNum+i)%VARIATION_TYPES.length;
    const variation=(i===2||i===4)&&isIsolation?VARIATION_TYPES[varIdx===0?1:varIdx]:null;
    return{...e,sets,variation};
  });
  let tip=FB_TIPS[dayId][sessionNum%FB_TIPS[dayId].length];
  if(focus.deload)tip="Deload week — lighter loads, perfect form, full recovery";
  return{sessionTitle:FB_TITLES[dayId][sessionNum%FB_TITLES[dayId].length],focusTip:tip,exercises:exs,isFallback:true};
}
function getWeightDecision(avgReps,targetReps,inc){
  const r=avgReps/targetReps;
  if(avgReps===0)return{action:"hold",delta:0,label:"Not logged",color:"#555"};
  if(r>=1.15)return{action:"increase",delta:inc,label:`Crushed it! Up ${inc}kg`,color:"#69f0ae"};
  if(r>=0.92)return{action:"increase",delta:inc,label:`Hit target! Up ${inc}kg`,color:"#69f0ae"};
  if(r>=0.75)return{action:"hold",delta:0,label:"Close — hold weight",color:"#ffd740"};
  if(r>=0.5)return{action:"hold",delta:0,label:"Hold — build strength",color:"#ffa040"};
  return{action:"decrease",delta:-inc,label:`Drop ${inc}kg — rebuild`,color:"#ff6b6b"};
}
function getRec(exId,startWeight,weights,focus){
  const s=weights[exId];const base=focus?.deload?Math.round(startWeight*0.8*2)/2:startWeight;
  if(!s)return{weight:base,badge:"🆕 First time",badgeColor:"#4fc3f7",detail:"Starting weight — adjust if needed"};
  const w=focus?.deload?Math.round(s.weight*0.8*2)/2:s.weight;
  if(!s.lastAvgReps)return{weight:w,badge:`→ ${w}kg`,badgeColor:"#ffd740",detail:focus?.deload?"Deload — 80% weight":"No rep data yet"};
  const dec=getWeightDecision(s.lastAvgReps,s.lastTargetReps,s.weightIncrement||2.5);
  const arrow=dec.action==="increase"?"↑":dec.action==="decrease"?"↓":"→";
  return{weight:w,badge:focus?.deload?`📉 ${w}kg`:`${arrow} ${w}kg`,badgeColor:focus?.deload?"#ffa040":dec.color,detail:focus?.deload?`Deload — 80% of ${s.weight}kg`:`Last: ${Number(s.lastAvgReps).toFixed(1)}/${s.lastTargetReps} reps · ${dec.label}`};
}
function buildPerfNotes(history,weights){return history.slice(0,3).map(h=>{const lines=(h.exerciseIds||[]).map(id=>{const w=weights[id];if(!w||!w.lastAvgReps)return null;const ratingStr=w.lastRatings?.length?`[${w.lastRatings.join(",")}]`:"";return`${id}:${Number(w.lastAvgReps).toFixed(1)}/${w.lastTargetReps}@${w.lastWeight}kg${ratingStr}`;}).filter(Boolean);return lines.length?`${h.date}: ${lines.join(",")}`:null;}).filter(Boolean).join("\n");}
function buildSeedSummary(weights){return Object.entries(weights).map(([id,w])=>`${SEED_NAMES[id]||id}:${w.weight}kg*${w.lastTargetReps}reps`).join(", ");}
function buildFocusInstructions(focus,profile){
  const dur=getDurationConfig(focus.workoutDuration||45);
  const p=[dur.aiNote];
  // User profile context
  if(profile){
    const goalMap={lose_weight:"lose weight",build_muscle:"build muscle",both:"build muscle and lose weight",maintain:"maintain fitness"};
    const goalStr=goalMap[profile.goal]||profile.goal||"general fitness";
    const genderStr=profile.gender||"unspecified";
    const ageStr=profile.age?`${profile.age} years old`:"unspecified age";
    const cycleStr=`${profile.workoutsPerCycle||3}-day cycle`;
    p.unshift(`USER PROFILE: ${ageStr}, ${genderStr}, goal: ${goalStr}, training on a ${cycleStr}. Tailor intensity, rep ranges, and progressions accordingly.`);
  }
  p.push("VARIETY RULE: Ensure balanced muscle coverage — do NOT repeat the same primary muscle group twice in one session. Include at least one push, one pull, one leg movement per session (unless restrictions say otherwise). Rotate stations from previous sessions.");
  p.push("EFFORT RATINGS: Rep data includes [ratings] where light=too easy, nailed=perfect, tough=hard but done, failed=couldn't finish. If ratings are mostly 'light', increase weight even if reps were borderline. If 'failed' appears, hold or reduce weight.");
  p.push("VARIATION: For 1-2 isolation exercises per session, include a 'variation' field — choose from: 'Slow Eccentric (4-count)', 'Partial Range', 'Pause Reps', 'Explosive Concentric'. Skip variations on heavy compound movements for safety.");
  if(focus.advancedMode&&focus.targetMuscles?.length)p.push(`TARGET MUSCLES: ${focus.targetMuscles.join(", ")}. Prioritise exercises hitting these specific muscle groups. Still respect all injury restrictions.`);
  else if(focus.trainingFocus==="upper")p.push("FOCUS: Upper body ONLY.");
  else if(focus.trainingFocus==="lower")p.push("FOCUS: Lower body ONLY.");
  else if(focus.trainingFocus==="core")p.push("FOCUS: Core + upper.");
  if(focus.deload)p.push("DELOAD: Reduce weights 20%, increase reps 2-3.");if(focus.skipKnees)p.push("SKIP KNEES: No leg press/extension/squats.");if(focus.skipAnkle)p.push("SKIP ANKLE: No calf raises, lunges, sled, single-leg balance.");if(focus.skipShoulders)p.push("SKIP SHOULDERS: No overhead press or lateral raises.");if(focus.skipBack)p.push("SKIP BACK: No rows or back extensions.");if(focus.skipChest)p.push("SKIP CHEST: No pressing or pec fly.");if(focus.customNote)p.push(`USER NOTE: ${focus.customNote}`);return"\n\nSPECIAL INSTRUCTIONS (MUST FOLLOW):\n"+p.join("\n");
}function getNextSetSuggestion(weight,reps,targetReps,rating,inc){
  if(!rating)return null;const r=EFFORT_RATINGS.find(e=>e.key===rating);if(!r)return null;
  if(rating==="light"&&reps>=targetReps)return{msg:`${r.emoji} Too light — try ${+(weight+inc).toFixed(1)}kg next set`,color:r.color};
  if(rating==="light")return{msg:`${r.emoji} Felt light but missed reps — hold ${weight}kg`,color:"#ffd740"};
  if(rating==="nailed")return{msg:`${r.emoji} Perfect — keep ${weight}kg`,color:r.color};
  if(rating==="tough"&&reps>=targetReps)return{msg:`${r.emoji} Tough but nailed it — hold ${weight}kg`,color:r.color};
  if(rating==="tough")return{msg:`${r.emoji} Missed reps — hold ${weight}kg for now`,color:"#ffd740"};
  if(rating==="failed")return{msg:`${r.emoji} Drop to ${Math.max(0,+(weight-inc).toFixed(1))}kg next set`,color:r.color};
  return null;
}

function fallbackRemix(exercise,otherNames,dayId,focus){

// ─── CSV Import ───────────────────────────────────────────────────────────────
function importCSVFile(file,appState,persistFn,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split('\n');
      const rows=lines.slice(1).filter(l=>l.trim());
      const newExHist={};const latestWeights={};
      const reverseMap={};
      Object.entries(EXERCISE_NAME_MAP).forEach(([id,n])=>{reverseMap[n.toLowerCase()]=id;});
      rows.forEach(row=>{
        const parts=[];let inQ=false,cur="";
        for(const ch of row){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){parts.push(cur.trim());cur="";}else{cur+=ch;}}
        parts.push(cur.trim());
        const[date,exName,,setsLogged,totalSets,avgReps,targetReps,weight,dayId]=parts;
        if(!date||!exName)return;
        const clean=exName.replace(/^"|"$/g,"");
        const exId=reverseMap[clean.toLowerCase()]||clean.toLowerCase().replace(/\s+/g,"_");
        if(!newExHist[exId])newExHist[exId]=[];
        const entry={date,weight:parseFloat(weight)||0,avgReps:parseFloat(avgReps)||null,targetReps:parseInt(targetReps)||12,setsLogged:parseInt(setsLogged)||0,totalSets:parseInt(totalSets)||0,dayId:dayId||"A"};
        newExHist[exId].push(entry);
        if(!latestWeights[exId]||new Date(date)>=new Date(latestWeights[exId].date))latestWeights[exId]=entry;
      });
      const newWeights={...appState.weights};
      Object.entries(latestWeights).forEach(([exId,entry])=>{
        newWeights[exId]={weight:entry.weight,lastWeight:entry.weight,lastAvgReps:entry.avgReps,lastTargetReps:entry.targetReps,weightIncrement:newWeights[exId]?.weightIncrement||2.5,lastCompleted:entry.setsLogged===entry.totalSets};
      });
      persistFn({...appState,exerciseHistory:newExHist,weights:newWeights});
      onDone(Object.keys(newExHist).length,rows.length,null);
    }catch(err){onDone(0,0,err.message);}
  };
  reader.readAsText(file);
}

// ─── Gym Map View ─────────────────────────────────────────────────────────────
function GymMapView(){
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[dragging,setDragging]=useState(false);
  const lastPos=useRef(null);
  const lastDist=useRef(null);
  const containerRef=useRef(null);

  function clampPan(z,px,py){
    // Allow panning proportional to zoom level
    const maxX=Math.max(0,(z-1)*300);const maxY=Math.max(0,(z-1)*200);
    return{x:Math.max(-maxX,Math.min(maxX,px)),y:Math.max(-maxY,Math.min(maxY,py))};
  }

  function onPointerDown(e){
    if(e.touches&&e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      lastDist.current=Math.hypot(dx,dy);
      return;
    }
    setDragging(true);
    lastPos.current={x:e.clientX||e.touches?.[0]?.clientX||0,y:e.clientY||e.touches?.[0]?.clientY||0};
    e.preventDefault();
  }
  function onPointerMove(e){
    if(e.touches&&e.touches.length===2&&lastDist.current!==null){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      const ratio=dist/lastDist.current;
      setZoom(z=>{const nz=Math.max(1,Math.min(5,z*ratio));return nz;});
      lastDist.current=dist;
      e.preventDefault();
      return;
    }
    if(!dragging||!lastPos.current)return;
    const cx=e.clientX||e.touches?.[0]?.clientX||0;
    const cy=e.clientY||e.touches?.[0]?.clientY||0;
    const dx=cx-lastPos.current.x;const dy=cy-lastPos.current.y;
    lastPos.current={x:cx,y:cy};
    setPan(p=>{return clampPan(zoom,p.x+dx,p.y+dy);});
    e.preventDefault();
  }
  function onPointerUp(){setDragging(false);lastPos.current=null;lastDist.current=null;}
  function onWheel(e){
    e.preventDefault();
    setZoom(z=>Math.max(1,Math.min(5,z*(e.deltaY<0?1.1:0.9))));
  }
  function reset(){setZoom(1);setPan({x:0,y:0});}

  return(
    <div style={{paddingTop:16,paddingBottom:20,animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}>
        <div>
          <div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:"#f0f0f0",letterSpacing:"0.05em",lineHeight:1}}>GYM MAP</div>
          <div style={{fontSize:"0.68rem",color:"#555",marginTop:2}}>Snap Fitness Watagan Park · Pinch to zoom · Drag to pan</div>
        </div>
        {zoom>1&&<button onClick={reset} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#888",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:"0.65rem"}}>↺ Reset</button>}
      </div>
      <div
        ref={containerRef}
        style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,overflow:"hidden",cursor:dragging?"grabbing":"grab",userSelect:"none",touchAction:"none",height:"calc(100vh - 220px)",maxHeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}
        onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
        onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
        onWheel={onWheel}
      >
        <img
          src="gym-map.JPG"
          alt="Snap Fitness Watagan Park floor map"
          draggable={false}
          style={{width:"100%",height:"100%",objectFit:"contain",transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transformOrigin:"center center",transition:dragging?"none":"transform 0.1s ease",willChange:"transform"}}
          onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}
        />
        <div style={{display:"none",flexDirection:"column",alignItems:"center",gap:12,padding:32,textAlign:"center"}}>
          <div style={{fontSize:"2rem"}}>🗺️</div>
          <div style={{fontFamily:"Bebas Neue",fontSize:"1.2rem",color:"#555",letterSpacing:"0.06em"}}>MAP NOT FOUND</div>
          <div style={{fontSize:"0.72rem",color:"#444",lineHeight:1.6}}>Add <code style={{color:"#666",background:"#1a1a1a",padding:"2px 6px",borderRadius:4}}>gym-map.JPG</code> to your repo root to show the floor plan here.</div>
        </div>
      </div>
      {zoom>1&&<div style={{textAlign:"center",marginTop:8,fontSize:"0.6rem",color:"#444"}}>{Math.round(zoom*100)}% zoom</div>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[appState,setAppState]=useState(null);
  const[view,setView]=useState("workout");
  const[workout,setWorkout]=useState(null);
  const[generating,setGenerating]=useState(false);
  const[sessionSets,setSessionSets]=useState({});
  const[sessionWeights,setSessionWeights]=useState({});
  const[weightInputDrafts,setWeightInputDrafts]=useState({});
  const[sessionRatings,setSessionRatings]=useState({});
  const[sessionSetWeights,setSessionSetWeights]=useState({});
  const[done,setDone]=useState(false);
  const[summary,setSummary]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[repPicker,setRepPicker]=useState(null);
  const[remixingId,setRemixingId]=useState(null);
  const[restTimer,setRestTimer]=useState(null);
  const[histModal,setHistModal]=useState(null);
  const[showDayPicker,setShowDayPicker]=useState(false);
  const[confirmModal,setConfirmModal]=useState(null); // {message,subtext,confirmLabel,onConfirm}
  const[showProfileSetup,setShowProfileSetup]=useState(false);
  const[showDurationPicker,setShowDurationPicker]=useState(false);
  const[pendingKickoff,setPendingKickoff]=useState(null); // {state, overrideDayIdx}
  const[postFeedback,setPostFeedback]=useState({feeling:null,note:""});
  const[showWarmup,setShowWarmup]=useState(false);
  const[showTipId,setShowTipId]=useState(null);
  const restRef=useRef(null);
  const hasGenerated=useRef(false);

  // rest timer tick
  useEffect(()=>{
    if(!restTimer||restTimer.remaining<=0){clearInterval(restRef.current);if(restTimer?.remaining===0)setTimeout(()=>setRestTimer(null),800);return;}
    restRef.current=setInterval(()=>setRestTimer(p=>p?{...p,remaining:p.remaining-1}:null),1000);
    return()=>clearInterval(restRef.current);
  },[restTimer?.remaining]);

  function getRestSecs(ex){return["Quads","Glutes","Hamstrings","Back","Lats","Chest","Upper Chest","Lower Chest"].includes(ex?.muscleGroup)?90:60;}
  function startRest(ex,hasNext){if(!hasNext)return;clearInterval(restRef.current);const s=getRestSecs(ex);setRestTimer({exId:ex.id,exName:ex.name,remaining:s,total:s});}
  function skipRest(){clearInterval(restRef.current);setRestTimer(null);}

  // load storage (with v10→v11 migration)
  useEffect(()=>{
    try{
      let saved=localStorage.getItem(STORAGE_KEY);
      // Migrate from v10 if v11 doesn't exist yet
      if(!saved){
        const old=localStorage.getItem(OLD_STORAGE_KEY);
        if(old){
          const p=JSON.parse(old);
          // Preserve all existing data, add new fields
          p.profile=p.profile||{...DEFAULT_PROFILE};
          p.profileConfigured=p.profileConfigured||false;
          if(!p.focus)p.focus={...DEFAULT_FOCUS};
          if(p.focus.skipAnkle===undefined)p.focus.skipAnkle=false;
          if(p.focus.workoutDuration===undefined)p.focus.workoutDuration=45;
          if(p.focus.advancedMode===undefined)p.focus.advancedMode=false;
          if(!p.focus.targetMuscles)p.focus.targetMuscles=[];
          if(!p.exerciseHistory)p.exerciseHistory={};
          localStorage.setItem(STORAGE_KEY,JSON.stringify(p));
          localStorage.removeItem(OLD_STORAGE_KEY);
          saved=JSON.stringify(p);
        }
      }
      if(saved){
        const p=JSON.parse(saved);
        if(!p.focus)p.focus={...DEFAULT_FOCUS};
        if(p.focus.skipAnkle===undefined)p.focus.skipAnkle=false;
        if(p.focus.workoutDuration===undefined)p.focus.workoutDuration=45;
        if(p.focus.advancedMode===undefined)p.focus.advancedMode=false;
        if(!p.focus.targetMuscles)p.focus.targetMuscles=[];
        if(p.focusConfigured===undefined)p.focusConfigured=false;
        if(!p.exerciseHistory)p.exerciseHistory={};
        if(!p.profile)p.profile={...DEFAULT_PROFILE};
        if(p.profileConfigured===undefined)p.profileConfigured=false;
        setAppState(p);
      }else{
        // Brand new user — empty weights, requires profile setup
        setAppState({cycleIdx:0,sessions:0,weights:{},history:[],exerciseHistory:{},focus:{...DEFAULT_FOCUS},focusConfigured:false,profile:{...DEFAULT_PROFILE},profileConfigured:false});
      }
    }catch{setAppState({cycleIdx:0,sessions:0,weights:{},history:[],exerciseHistory:{},focus:{...DEFAULT_FOCUS},focusConfigured:false,profile:{...DEFAULT_PROFILE},profileConfigured:false});}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded||!appState||hasGenerated.current)return;
    if(!appState.focusConfigured)return;
    hasGenerated.current=true;kickoff(appState);
  },[loaded,appState]);

  function persist(ns){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(ns));}catch{}setAppState(ns);return ns;}
  function updateFocus(f){return persist({...appState,focus:f});}

  async function kickoff(state,overrideDayIdx=null,showPicker=false){
    if(showPicker){setPendingKickoff({state,overrideDayIdx});setShowDurationPicker(true);return;}
    setGenerating(true);setDone(false);setWorkout(null);setSummary(null);setPostFeedback({feeling:null,note:""});setShowWarmup(false);
    const profile=state.profile||DEFAULT_PROFILE;
    const seq=getDaySeq(profile);
    const idx=overrideDayIdx!==null?overrideDayIdx:(state.cycleIdx%seq.length);
    const dayType=DAY_TYPES.find(d=>d.id===seq[idx%seq.length])||DAY_TYPES[0];
    const recentIds=state.history.slice(0,5).flatMap(h=>h.exerciseIds||[]);
    const perfNotes=buildPerfNotes(state.history,state.weights);
    const lastFeeling=state.history[0]?.sessionFeeling||null;

                      <button onClick={()=>remixExercise(ex.id)} style={{background:"#1e1e2e",border:"1px solid #2a2a45",color:"#7c7cff",borderRadius:7,padding:"3px 8px",cursor:"pointer",fontSize:"0.58rem",display:"flex",alignItems:"center",gap:3,whiteSpace:"nowrap"}}><span>🔀</span><span>busy?</span></button>
                    </div>
                    {ex.variation&&ex.variation!=="Standard"&&(<div style={{display:"inline-flex",alignItems:"center",gap:4,background:"#1a1800",border:"1px solid #ffd74033",borderRadius:6,padding:"2px 8px",marginBottom:4}}><span style={{fontSize:"0.7rem"}}>⏱</span><span style={{fontSize:"0.6rem",color:"#ffd740",fontWeight:600}}>{ex.variation}</span></div>)}
                    {showTipId===ex.id&&(()=>{const tip=EXERCISE_TIPS[ex.id];return tip?(<div style={{background:"#0d1520",border:"1px solid #1c3050",borderRadius:8,padding:"8px 12px",marginBottom:4}}><div style={{fontSize:"0.62rem",color:"#4fc3f7",fontWeight:700,marginBottom:2}}>{tip.muscle}</div><div style={{fontSize:"0.64rem",color:"#888",lineHeight:1.5}}>"{tip.cue}"</div>{ex.variation&&ex.variation!=="Standard"&&<div style={{fontSize:"0.6rem",color:"#ffd740",marginTop:4}}>⏱ {ex.variation}: apply this technique to each set</div>}</div>):null;})()}
                    <div style={{fontSize:"0.65rem",color:"#555"}}>{ex.sets} sets × {ex.reps} reps target</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:100}}>
                    <div style={{fontSize:"0.58rem",color:rec.badgeColor,fontWeight:700,textAlign:"center"}}>{rec.badge}</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      {/* FIX: 0.5kg steps */}
                      <button onClick={()=>{adjWeight(ex.id,-0.5);setWeightInputDrafts(p=>({...p,[ex.id]:undefined}));}} style={{width:28,height:28,borderRadius:7,border:"1px solid #2a2a2a",background:"#1a1a1a",color:"#888",fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <div style={{textAlign:"center",minWidth:60}}>
                        <input
                          type="number"
                          inputMode="decimal"
                          value={weightInputDrafts[ex.id]!==undefined?weightInputDrafts[ex.id]:curW}
                          onChange={e=>setWeightInputDrafts(p=>({...p,[ex.id]:e.target.value}))}
                          onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v>=0){setSessionWeights(p=>({...p,[ex.id]:Math.round(v*10)/10}));}setWeightInputDrafts(p=>({...p,[ex.id]:undefined}));}}
                          onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(e.target.value);if(!isNaN(v)&&v>=0){setSessionWeights(p=>({...p,[ex.id]:Math.round(v*10)/10}));}setWeightInputDrafts(p=>({...p,[ex.id]:undefined}));e.target.blur();}}}
                          style={{fontFamily:"Bebas Neue",fontSize:"1.85rem",color:"#f0f0f0",lineHeight:1,background:"transparent",border:"none",borderBottom:"1px solid #333",outline:"none",width:56,textAlign:"center",padding:"0 2px",MozAppearance:"textfield"}}
                        />
                        <div style={{fontSize:"0.58rem",color:"#444"}}>kg</div>
                      </div>
                      <button onClick={()=>{adjWeight(ex.id,+0.5);setWeightInputDrafts(p=>({...p,[ex.id]:undefined}));}} style={{width:28,height:28,borderRadius:7,border:"1px solid #2a2a2a",background:"#1a1a1a",color:"#888",fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                    <div style={{fontSize:"0.54rem",color:"#555",textAlign:"center",maxWidth:100,lineHeight:1.3}}>tap to type · ±0.5kg</div>
                    <div style={{fontSize:"0.54rem",color:"#666",textAlign:"center",maxWidth:100,lineHeight:1.3}}>{rec.detail}</div>
                  </div>
                </div>
                {suggestion&&(<div style={{marginBottom:8,background:"#111",border:`1px solid ${suggestion.color}44`,borderRadius:8,padding:"7px 12px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:"0.8rem",flexShrink:0}}>💬</span><span style={{fontSize:"0.68rem",color:suggestion.color,fontWeight:600,flex:1}}>{suggestion.msg}</span></div>)}
                <div style={{display:"flex",gap:6}}>{sets.map((reps,i)=>{const logged=reps!==null;const ratio=logged?reps/ex.reps:0;const ri=exRatings[i];const rInfo=ri?EFFORT_RATINGS.find(r=>r.key===ri):null;const bg=!logged?"#181818":ratio>=1?"#1a3d20":ratio>=0.75?"#2a2a0a":"#2a1010";const tc=!logged?"#555":ratio>=1?"#69f0ae":ratio>=0.75?"#ffd740":"#ff6b6b";const bc=!logged?"#252525":ratio>=1?"#2a5c30":ratio>=0.75?"#4a4a10":"#5c1818";return(<button key={i} onClick={()=>openPicker(ex.id,i,ex.reps)} style={{flex:1,minHeight:56,borderRadius:9,border:`1.5px solid ${bc}`,background:bg,color:tc,fontSize:"0.68rem",fontWeight:700,cursor:"pointer",transition:"all 0.2s",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"4px 2px"}}>{logged?<><span style={{fontSize:"0.54rem",opacity:0.6,marginBottom:1}}>SET {i+1}</span><span style={{fontFamily:"Bebas Neue",fontSize:"1.5rem",lineHeight:1}}>{reps}</span><span style={{fontSize:"0.54rem",opacity:0.7,marginTop:1}}>reps</span>{exSetWeights[i]&&<span style={{fontSize:"0.52rem",opacity:0.55,marginTop:2}}>{exSetWeights[i]}kg</span>}{rInfo&&<span style={{fontSize:"0.7rem",lineHeight:1,marginTop:1}}>{rInfo.emoji}</span>}</>:<><span style={{fontSize:"0.62rem",fontWeight:600}}>SET {i+1}</span><span style={{fontSize:"0.55rem",opacity:0.4,marginTop:2}}>tap to log</span></>}</button>);})}
                </div>
                {loggedArr.length>0&&(<div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:3,background:"#1e1e1e",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(avgReps/ex.reps)*100)}%`,background:repColor,borderRadius:2,transition:"width 0.3s"}}/></div><span style={{fontSize:"0.62rem",color:repColor,fontWeight:700,whiteSpace:"nowrap"}}>avg {avgReps.toFixed(1)} / {ex.reps}</span><button onClick={()=>{setSessionSets(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));setSessionRatings(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));setSessionSetWeights(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));}} style={{background:"transparent",border:"1px solid #2e2e2e",color:"#555",borderRadius:6,padding:"2px 7px",cursor:"pointer",fontSize:"0.6rem",whiteSpace:"nowrap",flexShrink:0}}>↩ undo</button></div>)}
                {ex.note&&<div style={{marginTop:8,fontSize:"0.66rem",color:"#666",background:"#111",borderRadius:6,padding:"5px 10px",lineHeight:1.5}}>💡 {ex.note}</div>}
              </>)}
            </div>);
          })}
        </>)}

        {workout&&!generating&&(<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
          {restTimer&&restTimer.remaining>0&&(()=>{const p=(restTimer.remaining/restTimer.total)*100;const urgent=restTimer.remaining<=10;const tc=urgent?"#ff6b6b":restTimer.remaining<=30?"#ffd740":"#69f0ae";const mins=Math.floor(restTimer.remaining/60);const secs=restTimer.remaining%60;const ts=mins>0?`${mins}:${secs.toString().padStart(2,"0")}`:`${secs}s`;return(<div style={{background:"#111",borderTop:`2px solid ${tc}`,padding:"10px 16px 6px"}}><div style={{maxWidth:600,margin:"0 auto"}}><div style={{height:3,background:"#1e1e1e",borderRadius:2,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:`${p}%`,background:tc,borderRadius:2,transition:"width 1s linear"}}/></div><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontSize:"0.58rem",color:"#555",fontWeight:700,letterSpacing:"0.08em",marginBottom:1}}>REST TIMER</div><div style={{fontSize:"0.65rem",color:"#777"}}>Next: {restTimer.exName}</div></div><div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:tc,lineHeight:1,animation:urgent?"pulse 0.6s infinite":"none",minWidth:54,textAlign:"center"}}>{ts}</div><button onClick={skipRest} style={{background:"#1e1e1e",border:`1px solid ${tc}55`,color:tc,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"0.85rem",whiteSpace:"nowrap"}}>SKIP →</button></div></div></div>);})()}
          <div style={{padding:"10px 16px 22px",background:"linear-gradient(transparent,#0e0e0e 35%)"}}><div style={{maxWidth:600,margin:"0 auto",display:"flex",gap:8}}>
            {!allComplete&&completedSets>0&&(<button onClick={()=>setConfirmModal({message:`Finish early?`,subtext:`Only ${completedSets}/${totalSets} sets logged.`,confirmLabel:"FINISH EARLY",onConfirm:finishWorkout})} style={{flex:"0 0 auto",height:52,padding:"0 16px",borderRadius:14,border:"1px solid #333",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"0.85rem",background:"#1a1a1a",color:"#888",lineHeight:1.2}}>FINISH<br/>EARLY</button>)}
            <button onClick={()=>{if(allComplete)finishWorkout();else if(completedSets===0)setConfirmModal({message:"No sets logged yet",subtext:"Finish session without logging anything?",confirmLabel:"FINISH ANYWAY",onConfirm:finishWorkout});}} disabled={!allComplete&&completedSets===0} style={{flex:1,height:52,borderRadius:14,border:"none",cursor:allComplete?"pointer":completedSets===0?"not-allowed":"pointer",fontFamily:"Bebas Neue",fontSize:"1.1rem",letterSpacing:"0.08em",transition:"all 0.3s",background:allComplete?"linear-gradient(135deg,#e31837,#ff4d6a)":"#161616",color:allComplete?"#fff":"#333",boxShadow:allComplete?"0 4px 26px rgba(227,24,55,0.35)":"none",animation:allComplete?"pulse 2s infinite":"none"}}>
              {allComplete?"✓ COMPLETE SESSION":`${totalSets-completedSets} SETS REMAINING`}
            </button>
          </div></div>
        </div>)}
      </>)}

      {/* DONE VIEW — Session Summary */}
      {view==="workout"&&done&&summary&&(<div style={{paddingTop:20,paddingBottom:20,animation:"fadeIn 0.6s ease"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:"3rem",marginBottom:8}}>🔥</div>
          <div style={{fontFamily:"Bebas Neue",fontSize:"2.4rem",color:"#e31837",letterSpacing:"0.05em"}}>SESSION DONE!</div>
          <div style={{fontSize:"0.78rem",color:"#666",marginTop:4}}>Session #{summary.sessionNum} · {summary.dayType.name}</div>
        </div>

        {/* Session Summary Table */}
        <div style={{background:"#141414",border:"1px solid #222",borderRadius:14,padding:"16px",marginBottom:14}}>
          <div style={{fontSize:"0.62rem",color:"#e31837",fontWeight:700,letterSpacing:"0.1em",marginBottom:12}}>📋 SESSION SUMMARY</div>
          {summary.rows.map((row,i)=>(
            <div key={i} style={{borderBottom:i<summary.rows.length-1?"1px solid #1c1c1c":"none",paddingBottom:i<summary.rows.length-1?10:0,marginBottom:i<summary.rows.length-1?10:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{flex:1,paddingRight:8}}>
                  <div style={{fontSize:"0.72rem",color:"#ccc",fontWeight:600}}>{row.name}</div>
                  <div style={{fontSize:"0.58rem",color:"#555",marginTop:2}}>Station #{row.equipNum} · {row.setsLogged}/{row.totalSets} sets completed</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:"0.78rem",color:"#f0f0f0",fontWeight:700}}>{row.weight}kg</div>
                  <div style={{fontSize:"0.58rem",color:row.delta>0?"#69f0ae":row.delta<0?"#ff6b6b":"#555"}}>{row.delta>0?`↑ ${row.nextWeight}kg next`:row.delta<0?`↓ ${row.nextWeight}kg next`:"→ hold"}</div>
                </div>
              </div>
              {/* Per-set breakdown */}
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {row.sets.map((s,si)=>{
                  if(s.reps===null)return<div key={si} style={{fontSize:"0.6rem",color:"#333",background:"#1a1a1a",borderRadius:5,padding:"2px 7px"}}>S{si+1}: —</div>;
                  const ratio=s.reps/row.targetReps;const tc=ratio>=1?"#69f0ae":ratio>=0.75?"#ffd740":"#ff6b6b";
                  return<div key={si} style={{fontSize:"0.6rem",color:tc,background:"#1a1a1a",borderRadius:5,padding:"2px 7px",whiteSpace:"nowrap"}}>S{si+1}: {s.reps}r{s.weight?` @${s.weight}kg`:""}</div>;
                })}
              </div>
              {row.avgReps!=null&&<div style={{fontSize:"0.6rem",color:"#555",marginTop:4}}>Avg {row.avgReps.toFixed(1)} / {row.targetReps} reps target</div>}
            </div>
          ))}
        </div>

        {/* Cool-down stretches */}
        {(()=>{const stretches=getStretchRoutine(summary.rows.map(r=>({muscleGroup:r.muscleGroup||""})));return stretches.length>0&&(<div style={{background:"#0d150d",border:"1px solid #1a3a1a",borderRadius:14,padding:"16px",marginBottom:14}}>
          <div style={{fontSize:"0.62rem",color:"#69f0ae",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>🧘 COOL-DOWN STRETCHES</div>
          {stretches.map((s,i)=><div key={i} style={{borderTop:i?`1px solid #1a2a1a`:"none",paddingTop:i?10:0,marginTop:i?10:0}}><div style={{fontSize:"0.72rem",fontWeight:600,color:"#ccc"}}>{s.name} <span style={{color:"#444",fontWeight:400}}>— {s.dur}</span></div><div style={{fontSize:"0.62rem",color:"#555",marginTop:3}}>"{s.cue}"</div></div>)}
        </div>);})()}

        {/* Next session */}
        <div style={{background:"#0d1520",border:"1px solid #1c3050",borderRadius:14,padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:"0.62rem",color:"#4fc3f7",fontWeight:700,letterSpacing:"0.1em",marginBottom:4}}>NEXT UP</div><div style={{fontFamily:"Bebas Neue",fontSize:"1.4rem",color:"#f0f0f0",letterSpacing:"0.05em"}}>{summary.nextDayType.label} — {summary.nextDayType.name.toUpperCase()}</div></div>
          <div style={{width:12,height:12,borderRadius:"50%",background:summary.nextDayType.color}}/>
        </div>

        {/* Post-workout feedback */}
        <div style={{background:"#141414",border:"1px solid #222",borderRadius:14,padding:"16px",marginBottom:14}}>
          <div style={{fontSize:"0.62rem",color:"#4fc3f7",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>💬 HOW DID YOU FEEL TODAY?</div>
          <div style={{display:"flex",gap:8,marginBottom:postFeedback.feeling?12:0}}>
            {[{key:"strong",emoji:"💪",label:"Strong"},{key:"good",emoji:"👍",label:"Good"},{key:"ok",emoji:"😐",label:"OK"},{key:"tired",emoji:"😴",label:"Tired"}].map(f=>{const sel=postFeedback.feeling===f.key;return(<button key={f.key} onClick={()=>setPostFeedback(p=>({...p,feeling:f.key}))} style={{flex:1,padding:"10px 4px",borderRadius:10,border:`1.5px solid ${sel?"#4fc3f7":"#222"}`,background:sel?"#0d1520":"#111",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:"1.3rem"}}>{f.emoji}</span>
              <span style={{fontSize:"0.58rem",color:sel?"#4fc3f7":"#555",fontWeight:sel?700:400}}>{f.label}</span>
            </button>);})}
          </div>
          {postFeedback.feeling&&(<input value={postFeedback.note} onChange={e=>setPostFeedback(p=>({...p,note:e.target.value}))} placeholder="Any notes? (optional)" maxLength={100} style={{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"9px 12px",color:"#ccc",fontSize:"0.75rem",outline:"none"}}/>)}
          {!postFeedback.feeling&&<div style={{fontSize:"0.6rem",color:"#333",marginTop:4}}>Tap to rate — the AI uses this next session</div>}
        </div>

        <button onClick={()=>{if(postFeedback.feeling)saveFeedback(postFeedback.feeling,postFeedback.note);setDone(false);hasGenerated.current=true;kickoff(appState,null,true);}} style={{width:"100%",height:52,borderRadius:14,border:"none",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"1.1rem",letterSpacing:"0.08em",background:"linear-gradient(135deg,#e31837,#ff4d6a)",color:"#fff",boxShadow:"0 4px 20px rgba(227,24,55,0.3)"}}>
          START NEXT SESSION →
        </button>
      </div>)}

      {/* HISTORY VIEW */}
      {view==="history"&&(<div style={{paddingTop:24,animation:"fadeIn 0.4s ease"}}>
        <div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:"#f0f0f0",letterSpacing:"0.05em",marginBottom:4}}>SESSION LOG</div>
        <div style={{fontSize:"0.72rem",color:"#666",marginBottom:20}}>{appState.sessions} session{appState.sessions!==1?"s":""} · No fixed schedule</div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"14px",marginBottom:20}}>
          <div style={{fontSize:"0.62rem",color:"#e31837",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>CYCLE POSITION</div>
          <div style={{display:"flex",gap:8}}>{daySeq.map((dayId,i)=>{const d=DAY_TYPES.find(x=>x.id===dayId)||DAY_TYPES[0];const isNext=i===(appState.cycleIdx%daySeq.length);return(<div key={i} style={{flex:1,background:isNext?"#1a0a0d":"#161616",border:`1.5px solid ${isNext?d.color:"#222"}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}><div style={{fontFamily:"Bebas Neue",fontSize:"1rem",color:isNext?d.color:"#333",letterSpacing:"0.06em"}}>{d.label}</div><div style={{fontSize:"0.54rem",color:isNext?"#888":"#2a2a2a",marginTop:2,lineHeight:1.3}}>{d.name}</div>{isNext&&<div style={{fontSize:"0.56rem",color:d.color,fontWeight:700,marginTop:4}}>▶ NEXT</div>}</div>);})}</div>
        </div>
        {appState.history.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#3a3a3a",fontSize:"0.82rem"}}>No sessions yet.</div>}
        {appState.history.map((h,i)=>{const dt=DAY_TYPES.find(d=>d.id===h.dayId)||DAY_TYPES[0];return(<div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:12,padding:"14px 15px",marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{fontFamily:"Bebas Neue",fontSize:"1rem",color:"#f0f0f0",letterSpacing:"0.05em"}}>DAY {h.dayId} — {h.sessionTitle||h.dayName?.toUpperCase()}</div>{h.wasAI&&<span style={{fontSize:"0.55rem",color:"#555",background:"#1a1a1a",padding:"1px 5px",borderRadius:4}}>🤖</span>}</div><div style={{fontSize:"0.65rem",color:"#555"}}>{h.date} at {h.time}</div></div><div style={{background:dt.color,color:"#000",fontSize:"0.58rem",fontWeight:700,padding:"2px 8px",borderRadius:20}}>#{appState.sessions-i}</div></div>{h.repData&&(<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{Object.entries(h.repData).map(([id,sets])=>{if(!sets||!sets.length)return null;const logged=sets.filter(r=>r!==null);const avg=logged.length?(logged.reduce((a,b)=>a+b,0)/logged.length).toFixed(1):"—";return<div key={id} style={{background:"#1a1a1a",borderRadius:5,padding:"2px 8px",fontSize:"0.6rem",color:"#777"}}>{id.replace(/_/g," ").split(" ")[0]} <span style={{color:"#e31837",fontWeight:700}}>{h.weights?.[id]??"-"}kg</span><span style={{color:"#555",marginLeft:3}}>{avg}r</span></div>;})}</div>)}</div>);})}
        {appState.sessions>0&&(<div style={{marginTop:24,textAlign:"center",paddingBottom:20}}><button onClick={()=>setConfirmModal({message:"Reset session history?",subtext:"Your weights and exercise history are kept — only the session log is cleared.",confirmLabel:"RESET",confirmColor:"#ff6b6b",onConfirm:()=>persist({...appState,cycleIdx:0,sessions:0,history:[]})})} style={{background:"transparent",border:"1px solid #222",color:"#3a3a3a",padding:"10px 22px",borderRadius:8,cursor:"pointer",fontSize:"0.7rem"}}>Reset Session History</button></div>)}
      </div>)}

      {/* WEIGHTS VIEW */}
      {view==="weights"&&<WeightsView appState={appState} persist={persist} setHistModal={setHistModal}/>}

      {/* MAP VIEW */}
      {view==="map"&&<GymMapView/>}

      {/* FOCUS VIEW */}
      {view==="focus"&&(<>
        {/* Profile summary card at top of Focus tab */}
        <div style={{paddingTop:20,marginBottom:0}}>
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <div>
              <div style={{fontSize:"0.6rem",color:"#555",fontWeight:700,letterSpacing:"0.08em",marginBottom:3}}>👤 YOUR PROFILE</div>
              <div style={{fontSize:"0.72rem",color:"#888"}}>
                {profile.age?<span style={{color:"#ccc",fontWeight:600}}>{profile.age}yo</span>:" "}
                {profile.gender&&<span style={{color:"#777"}}> · {profile.gender}</span>}
                {profile.goal&&<span style={{color:"#777"}}> · {({build_muscle:"build muscle",lose_weight:"lose weight",both:"build + lose",maintain:"maintain"})[profile.goal]||profile.goal}</span>}
                {profile.workoutsPerCycle&&<span style={{color:"#555"}}> · {profile.workoutsPerCycle}-day cycle</span>}
              </div>
            </div>
            <button onClick={()=>setShowProfileSetup(true)} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#666",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:"0.62rem",flexShrink:0}}>Edit</button>
          </div>
        </div>
        <FocusView focus={focus} onUpdate={updateFocus} isFirstRun={false}
          onApply={(nf)=>{const ns=updateFocus(nf);hasGenerated.current=false;setView("workout");kickoff(ns);}}/>
      </>)}

    </div>
  </div>);
}

// ─── Error Boundary ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return{hasError:true,error:err};}
  render(){
    if(!this.state.hasError)return this.props.children;
    return(
      <div style={{minHeight:"100vh",background:"#0e0e0e",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",textAlign:"center"}}>
        <style>{appStyle}</style>
        <div style={{fontSize:"3rem",marginBottom:16}}>⚠️</div>
        <div style={{fontFamily:"Bebas Neue",fontSize:"2rem",color:"#e31837",letterSpacing:"0.05em",marginBottom:8}}>SOMETHING WENT WRONG</div>
        <div style={{fontSize:"0.75rem",color:"#555",marginBottom:24,lineHeight:1.7,maxWidth:320}}>{this.state.error?.message||"An unexpected error occurred."}</div>
        <button onClick={()=>{this.setState({hasError:false,error:null});}} style={{background:"linear-gradient(135deg,#e31837,#ff4d6a)",border:"none",color:"#fff",borderRadius:12,padding:"12px 28px",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"1.1rem",letterSpacing:"0.1em",marginBottom:12}}>TRY AGAIN</button>
        <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);window.location.reload();}} style={{background:"transparent",border:"1px solid #333",color:"#555",borderRadius:12,padding:"10px 24px",cursor:"pointer",fontSize:"0.72rem"}}>Reset App Data</button>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
