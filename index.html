function applyFocus(exercises, focus) {
  let f = exercises;
  if (focus.trainingFocus==="upper") f=f.filter(e=>e.tags?.includes("upper")||e.tags?.includes("core"));
  else if (focus.trainingFocus==="lower") f=f.filter(e=>e.tags?.includes("lower")||e.tags?.includes("core"));
  else if (focus.trainingFocus==="core") f=f.filter(e=>e.tags?.includes("core")||e.tags?.includes("upper"));
  if (focus.skipKnees)     f=f.filter(e=>!e.tags?.includes("knee"));
  if (focus.skipAnkle)     f=f.filter(e=>!e.tags?.includes("ankle"));
  if (focus.skipShoulders) f=f.filter(e=>!e.tags?.includes("shoulder"));
  if (focus.skipBack)      f=f.filter(e=>!e.tags?.includes("back"));
  if (focus.skipChest)     f=f.filter(e=>!e.tags?.includes("chest"));
  if (f.length<3) {
    f=exercises.filter(e=>{
      if(focus.skipKnees&&e.tags?.includes("knee")) return false;
      if(focus.skipAnkle&&e.tags?.includes("ankle")) return false;
      if(focus.skipShoulders&&e.tags?.includes("shoulder")) return false;
      if(focus.skipBack&&e.tags?.includes("back")) return false;
      if(focus.skipChest&&e.tags?.includes("chest")) return false;
      return true;
    });
  }
  if (focus.deload) f=f.map(e=>({...e,reps:Math.round(e.reps*1.25),sets:Math.max(2,e.sets-1),startWeight:Math.round(e.startWeight*0.8*2)/2}));
  return f.slice(0,6);
}

const FB_TIPS={A:["Drive through heels on every leg movement","Control the negative — 2 seconds down","Full range beats heavy weight every time","Mind-muscle: feel every push rep","Chest up, core tight, push with purpose"],B:["Pull with elbows, not hands","Squeeze and hold peak contraction 1 second","Retract shoulder blades on every row","Your back burns the most calories — work it","Brace your core on every pull movement"],C:["Full body — stay focused between exercises","Quality over quantity on every compound","Rest 90 seconds — you've earned it","Breathe out on effort, in on return","Big muscles first, small muscles last"]};

function getFallback(dayId,sessionNum,recentIds,focus){
  const pool=EXERCISE_LIBRARY[dayId][sessionNum%3];
  const focused=applyFocus(pool,focus);
  const exercises=focused.filter(e=>!recentIds.slice(0,6).includes(e.id)).length>=3?focused.filter(e=>!recentIds.slice(0,6).includes(e.id)):focused;
  let tip=FB_TIPS[dayId][sessionNum%FB_TIPS[dayId].length];
  if(focus.deload) tip="Deload week — lighter loads, perfect form, full recovery";
  if(focus.trainingFocus==="upper") tip="Upper body focus — squeeze every rep with intent";
  if(focus.trainingFocus==="lower") tip="Lower body focus — drive through heels, control descent";
  return{sessionTitle:FB_TITLES[dayId][sessionNum%FB_TITLES[dayId].length],focusTip:tip,exercises,isFallback:true};
}

function getWeightDecision(avgReps,targetReps,inc){
  const r=avgReps/targetReps;
  if(avgReps===0) return{action:"hold",delta:0,label:"Not logged",color:"#555"};
  if(r>=1.15) return{action:"increase",delta:inc,label:`Crushed it! Up ${inc}kg`,color:"#69f0ae"};
  if(r>=0.92) return{action:"increase",delta:inc,label:`Hit target! Up ${inc}kg`,color:"#69f0ae"};
  if(r>=0.75) return{action:"hold",delta:0,label:"Close — hold weight",color:"#ffd740"};
  if(r>=0.5)  return{action:"hold",delta:0,label:"Hold — build strength",color:"#ffa040"};
  return{action:"decrease",delta:-inc,label:`Drop ${inc}kg — rebuild`,color:"#ff6b6b"};
}

function getRec(exId,startWeight,weights,focus){
  const s=weights[exId];
  const base=focus?.deload?Math.round(startWeight*0.8*2)/2:startWeight;
  if(!s) return{weight:base,badge:"🆕 First time",badgeColor:"#4fc3f7",detail:"Starting weight — adjust if needed"};
  const w=focus?.deload?Math.round(s.weight*0.8*2)/2:s.weight;
  if(!s.lastAvgReps) return{weight:w,badge:`→ ${w}kg`,badgeColor:"#ffd740",detail:focus?.deload?"Deload — 80% weight":"No rep data yet"};
  const dec=getWeightDecision(s.lastAvgReps,s.lastTargetReps,s.weightIncrement||2.5);
  const arrow=dec.action==="increase"?"↑":dec.action==="decrease"?"↓":"→";
  return{weight:w,badge:focus?.deload?`📉 ${w}kg`:`${arrow} ${w}kg`,badgeColor:focus?.deload?"#ffa040":dec.color,detail:focus?.deload?`Deload — 80% of ${s.weight}kg`:`Last: ${Number(s.lastAvgReps).toFixed(1)}/${s.lastTargetReps} reps · ${dec.label}`};
}

function buildPerfNotes(history,weights){
  return history.slice(0,3).map(h=>{
    const lines=(h.exerciseIds||[]).map(id=>{const w=weights[id];if(!w||!w.lastAvgReps)return null;return`${id}: ${Number(w.lastAvgReps).toFixed(1)}/${w.lastTargetReps}@${w.lastWeight}kg`;}).filter(Boolean);
    return lines.length?`${h.date}: ${lines.join(", ")}`:null;
  }).filter(Boolean).join("\n");
}
function buildSeedSummary(weights){return Object.entries(weights).map(([id,w])=>`${SEED_NAMES[id]||id}:${w.weight}kg×${w.lastTargetReps}reps`).join(", ");}
function buildFocusInstructions(focus){
  const p=[];
  if(focus.trainingFocus==="upper") p.push("TRAINING FOCUS: Upper body ONLY — no leg exercises. Extra sets for chest/back/shoulders/arms.");
  if(focus.trainingFocus==="lower") p.push("TRAINING FOCUS: Lower body ONLY — no upper body pushing or pulling. Legs, glutes, hamstrings.");
  if(focus.trainingFocus==="core")  p.push("TRAINING FOCUS: Core & upper body — at least 2 core exercises. No heavy lower body.");
  if(focus.deload)        p.push("DELOAD WEEK: Reduce all weights ~20%, increase reps 2-3. Focus form and recovery. Max 3 sets.");
  if(focus.skipKnees)     p.push("SKIP KNEES: No knee-loaded exercises (leg press, leg extension, squats). Glute drive and leg curl OK.");
  if(focus.skipAnkle)     p.push("SKIP ANKLE: No ankle-loading — NO calf raises (Station #8), NO lunges, NO single-leg balance, NO sled (Station #45). Seated and machine-based lower body OK.");
  if(focus.skipShoulders) p.push("SKIP SHOULDERS: No overhead pressing or lateral raises. Rows and pulldowns fine.");
  if(focus.skipBack)      p.push("SKIP BACK: No rows, pulldowns or back extensions. Focus chest, shoulders, arms, legs.");
  if(focus.skipChest)     p.push("SKIP CHEST: No chest pressing or pec fly. Focus back, shoulders, arms.");
  if(focus.customNote)    p.push(`USER NOTE: ${focus.customNote}`);
  return p.length?"\n\nSPECIAL INSTRUCTIONS (MUST FOLLOW):\n"+p.join("\n"):"";
}

  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:msg}]}),signal:ctrl.signal});
  if(!res.ok) throw new Error();
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();

}

async function tryAIRemix(exercise,otherNames,dayType,weights,focus){
  const focusInstructions=buildFocusInstructions(focus);
  const system=`Personal trainer AI, Snap Fitness Watagan Park.\n${EQUIP_STR}\n${focusInstructions}\nCRITICAL: Only use stations from the numbered list. equipNum must be the exact number string. Respond ONLY valid JSON.`;
  const msg=`Station #${exercise.equipNum} "${exercise.name}" is busy. Find a different exercise targeting "${exercise.muscleGroup}". Must NOT use: ${otherNames.join(",")}. Keep ${exercise.sets} sets × ${exercise.reps} reps.\n{"id":"snake_case_unique","name":"Exact station name","equipNum":"exact number","sets":${exercise.sets},"reps":${exercise.reps},"weightIncrement":${exercise.weightIncrement},"startWeight":${exercise.startWeight},"muscleGroup":"${exercise.muscleGroup||""}","note":"form tip or null"}`;
  const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),7000);
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system,messages:[{role:"user",content:msg}]}),signal:ctrl.signal});
  if(!res.ok) throw new Error();

function fallbackRemix(exercise,otherNames,dayId,focus){
  const all=EXERCISE_LIBRARY[dayId].flat();
  const safe=applyFocus(all,focus);
  const cands=safe.filter(e=>e.muscleGroup===exercise.muscleGroup&&e.id!==exercise.id&&!otherNames.includes(e.name));
  if(cands.length) return cands[Math.floor(Math.random()*cands.length)];
  const broad=safe.filter(e=>e.id!==exercise.id&&!otherNames.includes(e.name));
  return broad[Math.floor(Math.random()*broad.length)]||exercise;
}

const EFFORT_RATINGS=[
  {key:"light", emoji:"😎",label:"Too Light",   desc:"Could've done way more",    color:"#4fc3f7"},
  {key:"nailed",emoji:"💪",label:"Nailed It",   desc:"Hit it perfectly",          color:"#69f0ae"},
  {key:"tough", emoji:"😤",label:"Really Tough",desc:"Ground it out — good work", color:"#ffd740"},
  {key:"failed",emoji:"🔴",label:"Nearly Failed",desc:"Struggled to finish",      color:"#ff6b6b"},
];

function getNextSetSuggestion(weight,reps,targetReps,rating,inc){
  if(!rating) return null;
  const r=EFFORT_RATINGS.find(e=>e.key===rating);
  if(!r) return null;
  if(rating==="light"&&reps>=targetReps) return{weight:+(weight+inc).toFixed(1),msg:`${r.emoji} Too light — try ${+(weight+inc).toFixed(1)}kg next set`,color:r.color};
  if(rating==="light")                   return{weight,msg:`${r.emoji} Felt light but missed reps — hold ${weight}kg`,color:"#ffd740"};
  if(rating==="nailed")                  return{weight,msg:`${r.emoji} Perfect — keep ${weight}kg`,color:r.color};
  if(rating==="tough"&&reps>=targetReps) return{weight,msg:`${r.emoji} Tough but you got it — hold ${weight}kg`,color:r.color};
  if(rating==="tough")                   return{weight,msg:`${r.emoji} Missed some reps — hold ${weight}kg for now`,color:"#ffd740"};
  if(rating==="failed")                  return{weight:Math.max(0,+(weight-inc).toFixed(1)),msg:`${r.emoji} Drop to ${Math.max(0,+(weight-inc).toFixed(1))}kg next set`,color:r.color};
  return null;
}

function App(){
  const [appState,setAppState]=useState(null);
  const [view,setView]=useState("workout");
  const [workout,setWorkout]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [sessionSets,setSessionSets]=useState({});
  const [sessionWeights,setSessionWeights]=useState({});
  const [sessionRatings,setSessionRatings]=useState({});
  const [sessionSetWeights,setSessionSetWeights]=useState({});
  const [done,setDone]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [repPicker,setRepPicker]=useState(null);
  const [remixingId,setRemixingId]=useState(null);
  const [restTimer,setRestTimer]=useState(null);
  const restIntervalRef=useRef(null);
  const hasGenerated=useRef(false);

  useEffect(()=>{
    if(!restTimer||restTimer.remaining<=0){
      clearInterval(restIntervalRef.current);
      if(restTimer?.remaining===0) setTimeout(()=>setRestTimer(null),800);
      return;
    }
    restIntervalRef.current=setInterval(()=>setRestTimer(p=>p?{...p,remaining:p.remaining-1}:null),1000);
    return()=>clearInterval(restIntervalRef.current);
  },[restTimer?.remaining]);

  function getRestSeconds(ex){return["Quads","Glutes","Hamstrings","Back","Lats","Chest","Upper Chest","Lower Chest"].includes(ex?.muscleGroup)?90:60;}
  function startRest(ex,hasNextSet){
    if(!hasNextSet) return;
    clearInterval(restIntervalRef.current);
    const secs=getRestSeconds(ex);
    setRestTimer({exId:ex.id,exName:ex.name,remaining:secs,total:secs});
  }
  function skipRest(){clearInterval(restIntervalRef.current);setRestTimer(null);}

  useEffect(()=>{
    try{
      const saved=localStorage.getItem(STORAGE_KEY);
      if(saved){
        const p=JSON.parse(saved);
        if(!p.focus) p.focus={...DEFAULT_FOCUS};
        if(p.focus.skipAnkle===undefined) p.focus.skipAnkle=false;
        if(p.focusConfigured===undefined) p.focusConfigured=false;
        setAppState(p);
      } else {
        setAppState({cycleIdx:0,sessions:0,weights:SEED_WEIGHTS,history:[],seeded:true,focus:{...DEFAULT_FOCUS},focusConfigured:false});
      }
    }catch{
      setAppState({cycleIdx:0,sessions:0,weights:SEED_WEIGHTS,history:[],seeded:true,focus:{...DEFAULT_FOCUS},focusConfigured:false});
    }
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded||!appState||hasGenerated.current) return;
    if(!appState.focusConfigured) return;
    hasGenerated.current=true;
    kickoff(appState);
  },[loaded,appState]);

  function persist(ns){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(ns));}catch{}
    setAppState(ns);
    return ns;
  }
  function updateFocus(newFocus){return persist({...appState,focus:newFocus});}

  async function kickoff(state){
    setGenerating(true);setDone(false);setWorkout(null);
    const dayType=DAY_TYPES[state.cycleIdx%3];
    const recentIds=state.history.slice(0,3).flatMap(h=>h.exerciseIds||[]);
    const perfNotes=buildPerfNotes(state.history,state.weights);
    const focus=state.focus||DEFAULT_FOCUS;
    let w;
    try{w=await tryAIWorkout(dayType,state.sessions+1,recentIds,perfNotes,state.weights,focus);}
    catch{w=getFallback(dayType.id,state.sessions,recentIds,focus);}
    setWorkout({...w,dayType});
    const wts={},sets={},ratings={},setWts={};

                      <div style={{flex:1,height:3,background:"#1e1e1e",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(avgReps/ex.reps)*100)}%`,background:repColor,borderRadius:2,transition:"width 0.3s"}}/></div>
                      <span style={{fontSize:"0.62rem",color:repColor,fontWeight:700,whiteSpace:"nowrap"}}>avg {avgReps.toFixed(1)} / {ex.reps}</span>
                      <button onClick={()=>{setSessionSets(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));setSessionRatings(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));setSessionSetWeights(p=>({...p,[ex.id]:Array(ex.sets).fill(null)}));}} style={{background:"transparent",border:"1px solid #2e2e2e",color:"#555",borderRadius:6,padding:"2px 7px",cursor:"pointer",fontSize:"0.6rem",whiteSpace:"nowrap",flexShrink:0}}>↩ undo</button>
                    </div>)}
                    {ex.note&&<div style={{marginTop:8,fontSize:"0.66rem",color:"#666",background:"#111",borderRadius:6,padding:"5px 10px",lineHeight:1.5}}>💡 {ex.note}</div>}
                  </>)}
                </div>
              );
            })}
          </>)}

          {workout&&!generating&&(<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
            {restTimer&&restTimer.remaining>0&&(()=>{
              const pct=(restTimer.remaining/restTimer.total)*100;
              const urgent=restTimer.remaining<=10;
              const timerColor=urgent?"#ff6b6b":restTimer.remaining<=30?"#ffd740":"#69f0ae";
              const mins=Math.floor(restTimer.remaining/60);
              const secs=restTimer.remaining%60;
              const timeStr=mins>0?`${mins}:${secs.toString().padStart(2,"0")}`:`${secs}s`;
              return(
                <div style={{background:"#111",borderTop:`2px solid ${timerColor}`,padding:"10px 16px 6px"}}>
                  <div style={{maxWidth:600,margin:"0 auto"}}>
                    <div style={{height:3,background:"#1e1e1e",borderRadius:2,overflow:"hidden",marginBottom:8}}>
                      <div style={{height:"100%",width:`${pct}%`,background:timerColor,borderRadius:2,transition:"width 1s linear"}}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.58rem",color:"#555",fontWeight:700,letterSpacing:"0.08em",marginBottom:1}}>REST TIMER</div>
                        <div style={{fontSize:"0.65rem",color:"#777"}}>Next: {restTimer.exName}</div>
                      </div>
                      <div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:timerColor,lineHeight:1,animation:urgent?"pulse 0.6s infinite":"none",minWidth:54,textAlign:"center"}}>{timeStr}</div>
                      <button onClick={skipRest} style={{background:"#1e1e1e",border:`1px solid ${timerColor}55`,color:timerColor,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"0.85rem",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>SKIP →</button>
                    </div>
                  </div>
                </div>
              );
            })()}
            <div style={{padding:"10px 16px 22px",background:"linear-gradient(transparent,#0e0e0e 35%)"}}>
              <div style={{maxWidth:600,margin:"0 auto",display:"flex",gap:8}}>
                {!allComplete&&completedSets>0&&(<button onClick={()=>{if(confirm(`Only ${completedSets}/${totalSets} sets logged — finish early and save?`))finishWorkout();}} style={{flex:"0 0 auto",height:52,padding:"0 16px",borderRadius:14,border:"1px solid #333",cursor:"pointer",fontFamily:"Bebas Neue",fontSize:"0.85rem",letterSpacing:"0.08em",background:"#1a1a1a",color:"#888",lineHeight:1.2}}>FINISH<br/>EARLY</button>)}
                <button onClick={()=>{if(allComplete)finishWorkout();else if(completedSets===0){if(confirm("No sets logged — still finish session?"))finishWorkout();}}} disabled={!allComplete&&completedSets===0} style={{flex:1,height:52,borderRadius:14,border:"none",cursor:allComplete?"pointer":completedSets===0?"not-allowed":"pointer",fontFamily:"Bebas Neue",fontSize:"1.1rem",letterSpacing:"0.08em",transition:"all 0.3s",background:allComplete?"linear-gradient(135deg,#e31837,#ff4d6a)":"#161616",color:allComplete?"#fff":"#333",boxShadow:allComplete?"0 4px 26px rgba(227,24,55,0.35)":"none",animation:allComplete?"pulse 2s infinite":"none"}}>
                  {allComplete?"✓ COMPLETE SESSION":`${totalSets-completedSets} SETS REMAINING`}
                </button>
              </div>
            </div>
          </div>)}
        </>)}

        {/* DONE VIEW */}
        {view==="workout"&&done&&(<div style={{textAlign:"center",padding:"50px 16px",animation:"fadeIn 0.6s ease"}}>
          <div style={{fontSize:"4rem",marginBottom:12}}>🔥</div>
          <div style={{fontFamily:"Bebas Neue",fontSize:"2.6rem",color:"#e31837",letterSpacing:"0.05em"}}>SESSION DONE!</div>
          <div style={{fontSize:"0.82rem",color:"#666",marginTop:6,marginBottom:28}}>Session #{appState.sessions} complete. Weights updated.</div>
          <div style={{background:"#161616",border:"1px solid #222",borderRadius:14,padding:"18px",textAlign:"left",marginBottom:16}}>
            <div style={{fontSize:"0.62rem",color:"#e31837",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>NEXT SESSION WEIGHTS</div>
            {workout?.exercises.map(ex=>{
              const info=appState.weights[ex.id];if(!info) return null;
              const dec=info.lastAvgReps?getWeightDecision(info.lastAvgReps,info.lastTargetReps,info.weightIncrement||2.5):null;
              return(<div key={ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1c1c1c"}}>
                <div><div style={{fontSize:"0.72rem",color:"#ccc"}}>{ex.name}</div>{info.lastAvgReps?<div style={{fontSize:"0.6rem",color:"#555"}}>avg {Number(info.lastAvgReps).toFixed(1)} / {info.lastTargetReps} reps</div>:null}</div>
                <div style={{textAlign:"right"}}><div style={{fontSize:"0.75rem",color:dec?.color||"#888",fontWeight:700}}>{info.weight}kg</div>{dec&&<div style={{fontSize:"0.58rem",color:dec.color,opacity:0.8}}>{dec.action==="increase"?"↑ going up":dec.action==="decrease"?"↓ dropping":"→ same"}</div>}</div>
              </div>);
            })}
          </div>
          <div style={{background:"#0d1520",border:"1px solid #1c3050",borderRadius:14,padding:"14px 18px",marginBottom:24,textAlign:"left"}}>
            <div style={{fontSize:"0.62rem",color:"#4fc3f7",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>NEXT SESSION</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:"1.5rem",color:"#f0f0f0",letterSpacing:"0.05em"}}>{nextDayType.label} — {nextDayType.name.toUpperCase()}</div>
          </div>
          <button onClick={()=>setView("workout")} style={{background:"#e31837",color:"#fff",border:"none",padding:"13px 38px",borderRadius:12,fontFamily:"Bebas Neue",fontSize:"1.1rem",letterSpacing:"0.1em",cursor:"pointer"}}>BACK TO TRACKER</button>
        </div>)}

        {/* HISTORY VIEW */}
        {view==="history"&&(<div style={{paddingTop:24,animation:"fadeIn 0.4s ease"}}>
          <div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:"#f0f0f0",letterSpacing:"0.05em",marginBottom:4}}>SESSION LOG</div>
          <div style={{fontSize:"0.72rem",color:"#666",marginBottom:20}}>{appState.sessions} session{appState.sessions!==1?"s":""} · No fixed schedule</div>
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"14px",marginBottom:20}}>
            <div style={{fontSize:"0.62rem",color:"#e31837",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>CYCLE POSITION</div>
            <div style={{display:"flex",gap:8}}>{DAY_TYPES.map((d,i)=>{const isNext=i===(appState.cycleIdx%3);return(<div key={d.id} style={{flex:1,background:isNext?"#1a0a0d":"#161616",border:`1.5px solid ${isNext?d.color:"#222"}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}><div style={{fontFamily:"Bebas Neue",fontSize:"1.1rem",color:isNext?d.color:"#333",letterSpacing:"0.08em"}}>{d.label}</div><div style={{fontSize:"0.58rem",color:isNext?"#888":"#2a2a2a",marginTop:2,lineHeight:1.3}}>{d.name}</div>{isNext&&<div style={{fontSize:"0.56rem",color:d.color,fontWeight:700,marginTop:4}}>▶ NEXT</div>}</div>);})}</div>
          </div>
          {appState.history.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#3a3a3a",fontSize:"0.82rem"}}>No sessions yet.</div>}
          {appState.history.map((h,i)=>{
            const dt=DAY_TYPES.find(d=>d.id===h.dayId)||DAY_TYPES[0];
            const fs=h.focusSnapshot;
            return(<div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:12,padding:"14px 15px",marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontFamily:"Bebas Neue",fontSize:"1rem",color:"#f0f0f0",letterSpacing:"0.05em"}}>DAY {h.dayId} — {h.sessionTitle||h.dayName?.toUpperCase()}</div>
                    {h.wasAI&&<span style={{fontSize:"0.55rem",color:"#555",background:"#1a1a1a",padding:"1px 5px",borderRadius:4}}>🤖</span>}
                  </div>
                  <div style={{fontSize:"0.65rem",color:"#555"}}>{h.date} at {h.time}</div>
                  {fs&&(fs.trainingFocus!=="balanced"||fs.deload||fs.skipKnees||fs.skipAnkle||fs.skipShoulders||fs.skipBack||fs.skipChest)&&(<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    {fs.trainingFocus!=="balanced"&&<span style={{fontSize:"0.55rem",color:"#e31837",background:"#1a0808",padding:"1px 5px",borderRadius:10}}>💪 {fs.trainingFocus}</span>}
                    {fs.deload&&<span style={{fontSize:"0.55rem",color:"#ffa040",background:"#1a1000",padding:"1px 5px",borderRadius:10}}>📉 deload</span>}
                    {fs.skipKnees&&<span style={{fontSize:"0.55rem",color:"#ffd740",background:"#1a1800",padding:"1px 5px",borderRadius:10}}>🦵 no knees</span>}
                    {fs.skipAnkle&&<span style={{fontSize:"0.55rem",color:"#ffd740",background:"#1a1800",padding:"1px 5px",borderRadius:10}}>🦶 no ankle</span>}
                  </div>)}
                </div>
                <div style={{background:dt.color,color:"#000",fontSize:"0.58rem",fontWeight:700,padding:"2px 8px",borderRadius:20}}>#{appState.sessions-i}</div>
              </div>
              {h.repData&&(<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{Object.entries(h.repData).map(([id,sets])=>{if(!sets||!sets.length)return null;const logged=sets.filter(r=>r!==null);const avg=logged.length?(logged.reduce((a,b)=>a+b,0)/logged.length).toFixed(1):"—";return<div key={id} style={{background:"#1a1a1a",borderRadius:5,padding:"2px 8px",fontSize:"0.6rem",color:"#777"}}>{id.replace(/_/g," ").split(" ")[0]} <span style={{color:"#e31837",fontWeight:700}}>{h.weights?.[id]??"-"}kg</span><span style={{color:"#555",marginLeft:3}}>{avg}r</span></div>;})}</div>)}
            </div>);
          })}
          {appState.sessions>0&&(<div style={{marginTop:24,textAlign:"center",paddingBottom:20}}><button onClick={()=>{if(confirm("Reset session history? Weights are kept.")){persist({...appState,cycleIdx:0,sessions:0,history:[]});}}} style={{background:"transparent",border:"1px solid #222",color:"#3a3a3a",padding:"10px 22px",borderRadius:8,cursor:"pointer",fontSize:"0.7rem"}}>Reset Session History</button></div>)}
        </div>)}

        {/* WEIGHTS VIEW */}
        {view==="weights"&&(<div style={{paddingTop:24,animation:"fadeIn 0.4s ease"}}>
          <div style={{fontFamily:"Bebas Neue",fontSize:"2.2rem",color:"#f0f0f0",letterSpacing:"0.05em",marginBottom:4}}>YOUR WEIGHTS</div>
          <div style={{fontSize:"0.72rem",color:"#666",marginBottom:16}}>Current working weights · Updates after every session</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
            {Object.entries(appState.weights).map(([id,w])=>{
              const dec=w.lastAvgReps?getWeightDecision(w.lastAvgReps,w.lastTargetReps,w.weightIncrement||2.5):null;
              const name=SEED_NAMES[id]||id.replace(/_/g," ");
              return(<div key={id} style={{background:"#161616",border:"1px solid #222",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:"0.62rem",color:"#666",marginBottom:4,lineHeight:1.3}}>{name}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
                  <span style={{fontFamily:"Bebas Neue",fontSize:"2rem",color:"#f0f0f0",lineHeight:1}}>{w.weight}</span>
                  <span style={{fontSize:"0.65rem",color:"#555"}}>kg</span>
                  {dec&&<span style={{fontSize:"0.8rem",color:dec.color,marginLeft:4}}>{dec.action==="increase"?"↑":dec.action==="decrease"?"↓":"→"}</span>}
                </div>
                {w.lastAvgReps?<div style={{fontSize:"0.58rem",color:"#555"}}>{Number(w.lastAvgReps).toFixed(1)} / {w.lastTargetReps} reps last</div>:<div style={{fontSize:"0.58rem",color:"#444"}}>× {w.lastTargetReps} reps</div>}
              </div>);
            })}
          </div>
        </div>)}

        {/* FOCUS VIEW */}
        {view==="focus"&&(
          <FocusView focus={focus} onUpdate={updateFocus} isFirstRun={false} onApply={(newFocus)=>{
            const ns=updateFocus(newFocus);
            hasGenerated.current=false;
            setView("workout");
            kickoff(ns);
          }}/>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
